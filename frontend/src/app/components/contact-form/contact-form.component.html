<form (ngSubmit)="submit()" class="contact-form" novalidate>
  <div class="form-group">
    <label for="subject">Subject</label>
    <input id="subject" type="text" [(ngModel)]="subject" name="subject" required class="form-control" placeholder="Enter subject" />
  </div>
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" [(ngModel)]="message" name="message" required class="form-control" rows="5" placeholder="Describe your issue"></textarea>
  </div>
  <div class="form-group">
    <label for="file">Attachment (optional)</label>
    <input id="file" type="file" (change)="onFileSelected($event)" class="form-control-file" />
  </div>
  <div *ngIf="uploadProgress > 0" class="progress-bar">
    Upload Progress: {{ uploadProgress }}%
  </div>
  <div *ngIf="statusMessage" class="status-message">
    {{ statusMessage }}
  </div>
  <button type="submit" class="btn btn-primary" [disabled]="uploadProgress > 0">Submit</button>
</form>
