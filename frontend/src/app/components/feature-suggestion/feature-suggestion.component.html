<div class="feature-pane fade-in">
  <div class="feature-card glass-panel">
    <div class="header-banner">
      <i class="material-icons neon-icon">lightbulb</i>
      <h2 class="form-title">Suggest a Feature</h2>
      <p class="form-subtitle">Help shape the future of Safer Vault.</p>
    </div>

    <form (ngSubmit)="submit()" class="feature-suggestion-form">
      <div class="form-group">
        <label>Feature Title</label>
        <input type="text" class="input-accessible" [(ngModel)]="title" name="title" placeholder="E.g., Dark Web Scanner" required />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea class="input-accessible" [(ngModel)]="description" name="description" rows="4" placeholder="How would this feature help you stay secure?" required></textarea>
      </div>

      <div class="form-group file-upload-group">
        <label>Attachment <span class="optional">(optional)</span></label>
        <div class="file-upload-wrapper">
          <input type="file" id="file-upload" (change)="onFileSelected($event)" class="file-input-hidden" />
          <label for="file-upload" class="file-upload-btn">
            <i class="material-icons">cloud_upload</i> 
            {{ file ? file.name : 'Choose a file or screenshot...' }}
          </label>
        </div>
      </div>

      <div *ngIf="uploadProgress > 0 && uploadProgress < 100" class="upload-progress-container">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" [style.width.%]="uploadProgress"></div>
        </div>
        <span class="progress-text">{{ uploadProgress }}% Uploading</span>
      </div>

      <button type="submit" class="btn-accessible btn-electric-blue full-width submit-btn" [disabled]="!title || !description">
        Submit Idea
      </button>

      <p *ngIf="statusMessage" class="status-message" [class.success]="statusMessage.includes('submitted')" [class.error]="statusMessage.includes('Error')">
        {{ statusMessage }}
      </p>
    </form>
  </div>
</div>
